name: Storybook, Accessibility & Chromatic
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  NODE_VERSION: 22.13.0

permissions:
  contents: read

jobs:
  storybook-accessibility:
    runs-on: ubuntu-latest
    container:
      # Make sure to grab the latest version of the Playwright image
      # https://playwright.dev/docs/docker#pull-the-image
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Run tests
        run: npm run test-storybook

  jsunit-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Run tests
        run: npm run test-unit-coverage
        env:
          SB_URL: '${{ github.event.deployment_status.environment_url }}'

  lint-format-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Lint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx --config .github/linters/eslint.config.mjs

      - name: Format check
        # --check exits non-zero if any file differs from Prettier's output, failing the build.
        run: npx prettier --config .github/linters/.prettierrc --ignore-path .github/linters/.prettierignore --check . '**/*.{ts,tsx,js,jsx,yml}'

      - name: Build
        run: npm run build

  chromatic:
    if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
        env:
          CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
          CHROMATIC_SLUG: ${{ github.repository }}
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Run Chromatic
        uses: chromaui/action@5c6ec06f45a2117a25f07b1bf2b2f3009233fac8 # v16.3.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          autoAcceptChanges: 'main'
          skip: 'dependabot/**'
