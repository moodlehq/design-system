name: Storybook, Accessibility & Chromatic
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  NODE_VERSION: 22.22.1

permissions:
  contents: read

jobs:
  storybook-accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Install Playwright runtime
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test-storybook

  jsunit-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Run tests
        run: npm run test-unit-coverage
        env:
          SB_URL: '${{ github.event.deployment_status.environment_url }}'

  lint-format-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Lint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx --config .github/linters/eslint.config.mjs

      - name: Format check
        # --check exits non-zero if any file differs from Prettier's output, failing the build.
        run: npx prettier --config .github/linters/.prettierrc --ignore-path .github/linters/.prettierignore --check . '**/*.{ts,tsx,js,jsx,yml}'

      - name: Build
        run: npm run build

  chromatic:
    if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Run Chromatic
        uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # v18.0.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          storybookBaseDir: '.'
          autoAcceptChanges: 'main'
          skip: 'dependabot/**'
        env:
          CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CHROMATIC_SLUG: ${{ github.repository }}
