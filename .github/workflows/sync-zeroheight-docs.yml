name: Sync ZeroHeight design system docs

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.13.0

      - name: Install dependencies
        run: npm ci

      - name: Generate design system instruction file
        run: npm run build-docs
        env:
          ZEROHEIGHT_MCP_URL: ${{ secrets.ZEROHEIGHT_MCP_URL }}

      - name: Open pull request if file changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: 'chore: regenerate design-system.instructions.md from ZeroHeight'
          branch: auto/sync-zeroheight-docs
          delete-branch: true
          title: 'chore: Sync ZeroHeight design system docs'
          body: |
            Auto-generated by the **Sync ZeroHeight design system docs** workflow.

            Regenerates `.github/instructions/design-system.instructions.md` from
            the live ZeroHeight styleguide at https://design.moodle.com/.
          labels: |
            documentation
            automated
